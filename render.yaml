services:
  - type: web
    name: neural-frontier-api
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: FRONTEND_URL
        value: https://neural-frontier.vercel.app # Replace with actual Vercel URL
